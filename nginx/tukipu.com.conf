# Nginx vhost para Kipu (tukipu.com)
# -----------------------------------------------------------------------------
# Este archivo reemplaza tu actual /etc/nginx/sites-available/kipus.
#
# Instalar en el server:
#   sudo cp /opt/kipu/nginx/tukipu.com.conf /etc/nginx/sites-available/kipus
#   sudo nginx -t && sudo systemctl reload nginx
#
# Arranca en HTTP puro (como ya lo tienes). Luego, una sola vez:
#   sudo certbot --nginx -d tukipu.com -d www.tukipu.com
# certbot detecta este vhost, emite el cert de Let's Encrypt, y añade el bloque
# HTTPS + la redirección 80→443 automáticamente. Nada más que hacer de tu parte.
# -----------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name tukipu.com www.tukipu.com;

    # Tamaño de subida (catálogos, imágenes). La app acepta 10MB en JSON;
    # 25MB deja aire para forms multipart (logos, comprobantes).
    client_max_body_size 25M;

    # Timeouts largos: las llamadas a IA (Gemini/OpenAI) y a Apify pueden tardar
    # 30–90s. El default de 60s corta respuestas válidas.
    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # Headers estándar de reverse proxy
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # WebSocket upgrade (inofensivo si no se usa)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_cache_bypass $http_upgrade;

    # Headers de seguridad mínimos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Todo el tráfico → app Node en el host (puerto 3009 bindeado a localhost)
    location / {
        proxy_pass http://127.0.0.1:3009;
    }

    # Webhooks (Instagram, TikTok, ManyChat) — sin buffering para respuestas rápidas
    location /api/webhook/ {
        proxy_pass http://127.0.0.1:3009;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check local
    location = /api/health {
        proxy_pass http://127.0.0.1:3009/api/health;
        access_log off;
    }
}
